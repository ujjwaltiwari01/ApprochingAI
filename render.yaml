# Render Blueprint — two services from one repo (split API vs dashboard deploy cycles)
#
# outreach-api: Docker image, Playwright-capable, JOB_SECRET, DATABASE_URL, Brevo keys
# outreach-dashboard: lightweight Streamlit, Supabase REST only (no async DB driver)
#
# SKIP_PLAYWRIGHT=true on API: free tier can't run headless browser reliably at scale;
# we use website_cache + CSV-seeded analysis instead.
services:
  - type: web
    name: outreach-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_POOLER_HOST
        value: aws-1-ap-northeast-2.pooler.supabase.com
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RENDER_PUBLIC_URL
        fromService:
          type: web
          name: outreach-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: WEBHOOK_SECRET
        sync: false
      - key: JOB_SECRET
        sync: false
      - key: BREVO_API_KEY_1
        sync: false
      - key: BREVO_SENDER_EMAIL_1
        sync: false
      - key: BREVO_API_KEY_2
        sync: false
      - key: BREVO_SENDER_EMAIL_2
        sync: false
      - key: BREVO_API_KEY_3
        sync: false
      - key: BREVO_SENDER_EMAIL_3
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: MISTRAL_API_KEY_2
        sync: false
      - key: LLM_PROVIDERS
        value: mistral,cerebras,openrouter,gemini,groq
      - key: LLM_TIMEOUT_SECONDS
        value: "30"
      - key: LLM_REQUEST_DELAY_MS
        value: "400"
      - key: LLM_MAX_CONCURRENT
        value: "2"
      - key: LLM_EMAIL_MAX_RETRIES
        value: "1"
      - key: LLM_COMPACT_ANALYSIS
        value: "true"
      - key: JOB_CHUNK_SIZE
        value: "15"
      - key: SKIP_PLAYWRIGHT
        value: "true"
      - key: ALLOW_INVALID_SEND
        value: "false"
      - key: DAILY_NEW_PER_ACCOUNT
        value: "150"
      - key: DAILY_FOLLOWUP_PER_ACCOUNT
        value: "150"
      - key: BATCH_SIZE
        value: "100"
      - key: SENDER_PORTFOLIO_URL
        value: https://ujjwaltiwari01.netlify.app/
      - key: SENDER_LINKEDIN_URL
        value: https://linkedin.com/in/ujjwal-tiwari-b34044341
      - key: SENDER_EMAIL
        value: ujjwal.it2023-24@recabn.ac.in

  - type: web
    name: outreach-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-dashboard.txt
    startCommand: streamlit run streamlit_app/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: RENDER_PUBLIC_URL
        fromService:
          type: web
          name: outreach-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: JOB_SECRET
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: MISTRAL_API_KEY_2
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_PROVIDERS
        value: mistral,cerebras,openrouter,gemini,groq
      - key: LLM_TIMEOUT_SECONDS
        value: "30"
      - key: LLM_REQUEST_DELAY_MS
        value: "400"
      - key: LLM_MAX_CONCURRENT
        value: "2"
      - key: LLM_EMAIL_MAX_RETRIES
        value: "1"
      - key: LLM_COMPACT_ANALYSIS
        value: "true"
