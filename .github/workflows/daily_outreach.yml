# =============================================================================
# Daily Outreach — external scheduler (replaces Render cron + long-running workers)
#
# INTERVIEW WHY GitHub Actions instead of in-process APScheduler/Celery:
#   - Render free: no Redis, ~30s HTTP timeout, spins down when idle.
#   - GHA can run 6 hours and call our API every 5 min with JOB_SECRET.
#
# Two crons: 7 PM IST primary, 1 AM IST backup if 6h timeout hit on primary.
# concurrency.cancel-in-progress=false → queue overlapping runs, don't double-send.
# =============================================================================
name: Daily Outreach

on:
  schedule:
    # 7:00 PM IST — primary run (13:30 UTC)
    - cron: "30 13 * * *"
    # 1:00 AM IST — continuation if primary hits 6h limit or max chunks (19:30 UTC)
    - cron: "30 19 * * *"
  workflow_dispatch:

concurrency:
  group: daily-outreach
  cancel-in-progress: false

jobs:
  trigger-outreach:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.RENDER_URL }}" ] || [ -z "${{ secrets.JOB_SECRET }}" ]; then
            echo "RENDER_URL and JOB_SECRET must be set in GitHub repository secrets"
            exit 1
          fi

      - name: Wake API (Render cold start)
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
        run: |
          set -e
          base="${RENDER_URL%/}"
          for i in $(seq 1 12); do
            code=$(curl -s -o /tmp/health.json -w "%{http_code}" "${base}/health")
            echo "Health attempt $i: HTTP ${code}"
            if [ "$code" = "200" ]; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 15
          done
          echo "API did not respond on ${base}/health"
          exit 1

      - name: Run outreach chunks until complete
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
          JOB_SECRET: ${{ secrets.JOB_SECRET }}
        run: |
          set -e
          base="${RENDER_URL%/}"
          # 36 chunks × (~4 min work + 5 min sleep) ≈ 5.4h — under GitHub 6h job limit
          for i in $(seq 1 36); do
            echo "=== Chunk $i/36 ==="
            for attempt in 1 2 3; do
              http_code=$(curl -s -o /tmp/chunk.json -w "%{http_code}" -X POST "${base}/jobs/daily-outreach" \
                -H "Authorization: Bearer ${JOB_SECRET}" \
                -H "Content-Type: application/json")
              body=$(cat /tmp/chunk.json)
              echo "HTTP ${http_code} (attempt ${attempt})"
              echo "$body"
              if [ "$http_code" = "409" ]; then
                echo "Chunk already running — waiting 2 minutes before retry..."
                sleep 120
                continue
              fi
              break
            done
            if [ "$http_code" = "401" ]; then
              echo "JOB_SECRET mismatch: copy JOB_SECRET from Render outreach-api Environment into GitHub secrets."
              exit 1
            fi
            if [ "$http_code" != "200" ]; then
              echo "Request failed (HTTP ${http_code}). Check Render outreach-api logs."
              exit 1
            fi
            completed=$(echo "$body" | python3 -c "import sys,json; print(json.load(sys.stdin).get('completed', False))")
            if [ "$completed" = "True" ]; then
              echo "Daily outreach complete."
              exit 0
            fi
            if [ "$i" -lt 36 ]; then
              echo "Waiting 5 minutes before next chunk..."
              sleep 300
            fi
          done
          echo "Reached max chunks without completion — continuation run at 1 AM IST will resume today's job."
          exit 0
